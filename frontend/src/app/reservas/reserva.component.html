<div class="container">

  <h1>Reservas do Condomínio</h1>

  <!-- DATA -->
  <div class="filtros">
    <label>Data:</label>
    <input type="date" [(ngModel)]="selectedDate" />

    <label>Espaço:</label>
    <select [(ngModel)]="selectedSpace">
      <option *ngFor="let s of spaces" [value]="s">
        {{ s }}
      </option>
    </select>
  </div>

  <!-- ERRO -->
  <div *ngIf="erro" class="erro">
    {{ erro }}
  </div>

  <!-- LISTA DE RESERVAS -->
  <div class="card">
    <h2>Reservas do dia</h2>

    <div *ngIf="reservasDoDia().length > 0; else vazio">

      <div *ngFor="let r of reservasDoDia()" class="reserva-item">

        <div>
          <strong>{{ r.espacoReservado }}</strong>
          <span> | {{ r.horaInicio }} - {{ r.horaFim }}</span>
          <span> | {{ r.status }}</span>
        </div>

        <button (click)="cancelarReserva(r.id!)">
          Cancelar
        </button>

      </div>

    </div>

    <ng-template #vazio>
      <p>Nenhuma reserva para essa data</p>
    </ng-template>
  </div>

  <!-- HORÁRIOS -->
  <div class="card">
    <h2>Horários disponíveis ({{ selectedSpace }})</h2>

    <div class="horarios">

      <button
        *ngFor="let h of [
          '08:00','09:00','10:00','11:00',
          '12:00','13:00','14:00','15:00',
          '16:00','17:00','18:00','19:00','20:00'
        ]"
        [disabled]="isHorarioOcupado(h)"
        (click)="criarReserva(h, proximaHora(h))"
        [ngClass]="{
          ocupado: isHorarioOcupado(h),
          livre: !isHorarioOcupado(h)
        }"
      >
        {{ h }}
      </button>

    </div>
  </div>

</div>
