<div class="modal-container">
  <div class="modal-header">
    <h2 class="titulo-modal">Nova Reserva</h2>
    <button class="close-btn">&times;</button>
  </div>

  <div class="form-group">
    <label>ÁREA COMUM</label>
    <select class="form-control">
      <option value="1">Churrasqueira 1</option>
      <option value="2">Churrasqueira 2</option>
    </select>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>DATA</label>
      <input type="date" class="form-control" [(ngModel)]="dataSelecionada">
    </div>
    <div class="form-group">
      <label>HORÁRIO</label>
      <select class="form-control" [(ngModel)]="horarioSelecionado">
        <option value="08:00 às 12:00">08h às 12h</option>
        <option value="13:00 às 17:00">13h às 17h</option>
        <option value="18:00 às 22:00">18h às 22h</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label>OBSERVAÇÕES (OPCIONAL)</label>
    <textarea 
      class="form-control"
      placeholder="Ex: Aniversário de 15 anos, aprox. 25 pessoas..."
      [(ngModel)]="observacoes">
    </textarea>
  </div>

  <div class="modal-footer">
    <button class="btn-cancel">Cancelar</button>
    <button class="btn-confirm" (click)="confirmarReserva()">
      Confirmar reserva &rarr;
    </button>
  </div>
</div>
